# Netlify configuration — one codebase, all vertical routes, deployed as one site.
#
# This is the landing page (front end). Lead captures POST to app/api/lead, which
# is a placeholder until you wire a backend (n8n / CRM / email).
#
# To later run extra per-vertical DOMAINS from this SAME repo, create additional
# Netlify sites pointed at this repo and set SITE_VERTICAL in each site's
# environment (see README "Future: multiple domains").

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# The official Next.js runtime. Netlify auto-installs it; declared here explicitly
# so server Route Handlers (app/api/lead) deploy as serverless functions.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers on every response. The CSP is Report-Only for now so it cannot
# break the live site; review violations in the browser console, then rename it to
# "Content-Security-Policy" to enforce.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.clarity.ms https://*.clarity.ms https://us-assets.i.posthog.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://us.i.posthog.com https://us-assets.i.posthog.com https://*.clarity.ms; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"

# Long-cache the static media (filenames are stable).
[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
